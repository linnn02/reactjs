<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lab 10 Task 2 - MVVM Form</title>
    <style>
    body {
        font-family: Arial, sans-serif;
        max-width: 600px;
        margin: 40px auto;
        padding: 20px;
        background: #f7f8fa;
    }
    
    .mvvm-form {
        background: #ffffff;
        padding: 24px;
        border-radius: 12px;
        box-shadow: 0 6px 24px rgba(0, 0, 0, 0.08);
    }
    
    h1 {
        margin-top: 0;
        text-align: center;
    }
    
    .form-group {
        margin-bottom: 16px;
    }
    
    .form-group label {
        display: block;
        margin-bottom: 6px;
        font-weight: bold;
    }
    
    .form-group input {
        width: 100%;
        padding: 10px;
        border: 1px solid #d9d9d9;
        border-radius: 8px;
        box-sizing: border-box;
    }
    
    .error {
        display: block;
        margin-top: 6px;
        color: #dc3545;
        font-size: 13px;
    }
    
    .preview {
        background: #f5f6f8;
        padding: 16px;
        border-radius: 8px;
        margin: 20px 0;
    }
    
    .actions {
        display: flex;
        gap: 10px;
    }
    
    .actions button {
        flex: 1;
        padding: 10px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
    }
    
    #saveBtn {
        background: #0d6efd;
        color: white;
    }
    
    #saveBtn:disabled {
        background: #b8c2cc;
        cursor: not-allowed;
    }
    
    #resetBtn {
        background: #6c757d;
        color: white;
    }
    
    #message {
        margin-top: 16px;
        padding: 10px;
        border-radius: 8px;
    }
    
    .success {
        background: #d1e7dd;
        color: #0f5132;
    }
    
    .error-box {
        background: #f8d7da;
        color: #842029;
    }
    </style>
    </head>
    <body>
        <div id="app"></div>
        
        <script type="module">
        import { UserProfileViewModel } from "./mvvm/viewmodel/UserProfileViewModel.js";
        import { UserProfileForm } from "./mvvm/view/UserProfileForm.js";
        
        const viewModel = new UserProfileViewModel();
        const form = new UserProfileForm("app", viewModel);
        form.render();
        </script>
        </body>
        </html>
