<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lab 8 Task 1 - Flyweight Pattern</title>
    <style>
    body {
        font-family: Arial, sans-serif;
        margin: 20px;
        background: #f4f7fb;
        color: #222;
    }
    
    h1 {
        margin-bottom: 10px;
    }
    
    .controls {
        margin-bottom: 16px;
    }
    
    button {
        margin-right: 10px;
        padding: 10px 16px;
        border: none;
        background: #2563eb;
        color: white;
        border-radius: 8px;
        cursor: pointer;
    }
    
    button:hover {
        background: #1d4ed8;
    }
    
    #forestCanvas {
        border: 1px solid #ccc;
        background: #dff3ff;
        display: block;
        margin-top: 10px;
    }
    
    .panel {
        margin-top: 16px;
        padding: 12px;
        background: white;
        border-radius: 10px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        max-width: 700px;
    }
    </style>
    </head>
    <body>
        <h1>Lab 8 Task 1: Flyweight Pattern</h1>
        <p>Визуализация леса из 10 000 деревьев с оптимизацией памяти.</p>
        
        <div class="controls">
            <button id="generateBtn">Сгенерировать лес</button>
            <button id="benchmarkBtn">Запустить benchmark</button>
        </div>
        
        <canvas id="forestCanvas" width="1200" height="700"></canvas>
        
        <div class="panel" id="info"></div>
        <div class="panel" id="benchmarkInfo"></div>
        
        <script type="module" src="./main.js"></script>
    </body>
    </html>
