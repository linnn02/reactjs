<!DOCTYPE html>
<html lang=""ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lab 8 Task 2 - Event Delegation</title>
    <style>
    body {
        font-family: Arial, sans-serif;
        margin: 20px;
        background: #f7f8fc;
        color: #222;
    }
    
    h1 {
        margin-bottom: 10px;
    }
    
    .controls {
        margin-bottom: 16px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
    }
    
    input[type="text"] {
        padding: 10px;
        min-width: 260px;
        border: 1px solid #ccc;
        border-radius: 8px;
    }
    
    button {
        padding: 10px 14px;
        border: none;
        background: #2563eb;
        color: white;
        border-radius: 8px;
        cursor: pointer;
    }
    
    button:hover {
        background: #1d4ed8;
    }
    
    #todo-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
        max-width: 900px;
        margin-top: 16px;
    }
    
    .todo-item {
        background: white;
        border-radius: 10px;
        padding: 12px;
        display: flex;
        align-items: center;
        gap: 12px;
        justify-content: space-between;
        box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        border-left: 6px solid #9ca3af;
    }
    
    .todo-item.completed .todo-text {
        text-decoration: line-through;
        opacity: 0.65;
    }
    
    .priority-high {
        border-left-color: #ef4444;
    }
    
    .priority-normal {
        border-left-color: #3b82f6;
    }
    
    .priority-low {
        border-left-color: #10b981;
    }
    
    .todo-actions {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
    }
    
    .todo-text {
        flex: 1;
    }
    
    .edit-input {
        flex: 1;
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 6px;
    }
    
    .panel {
        margin-top: 16px;
        padding: 12px;
        background: white;
        border-radius: 10px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        max-width: 700px;
    }
    </style>
    </head>
    <body>
        <h1>Lab 8 Task 2: Event Delegation</h1>
        <p>Todo list на 1000+ элементов с единым обработчиком событий.</p>
        
        <div class="controls">
            <input type="text" id="todoInput" placeholder="Введите новую задачу" />
            <button id="addBtn">Добавить задачу</button>
            <button id="generateBtn">Сгенерировать 1000 задач</button>
            <button id="performanceBtn">Сравнить производительность</button>
        </div>
        
        <div id="todo-list"></div>
        <div class="panel" id="info"></div>
        
        <script type="module" src="./main.js"></script>
    </body>
    </html>
